name: Generate Daily E-Paper Image

on:
  schedule:
    - cron: '0 4 * * *' # Triggers daily at 04:00 UTC / Midnight EST
  workflow_dispatch: # Allows manual pipeline triggering from the GitHub UI

jobs:
  build-and-refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial permission flag allowing the runner to save changes back to the repo

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Rendering Engine
      run: python generate_dashboard.py

    - name: Commit and Push Image Asset
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add dashboard.png
        git diff-index --quiet HEAD || git commit -m "Automated display refresh: $(date +'%Y-%m-%d')"
        git push
